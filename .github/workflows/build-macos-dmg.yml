name: Build macOS DMG

on:
  workflow_dispatch:

jobs:
  build-macos-dmg:
    name: Build QCAD Architect Copilot DMG
    runs-on: macos-15-intel
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build DMG
        env:
          QT_VERSION: 5.15.2
          QT_ARCH: clang_64
        run: ./agent/qcad-tools/build_macos_local.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: qcad-architect-copilot-macos
          path: |
            dist/qcad-architect-copilot-macos-x86_64.dmg
            dist/SHA256SUMS-macos.txt
          if-no-files-found: error
